<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diretório de Nutricionistas - NutriAcesso</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/directory.css" />
</head>
<body>

  <nav class="navbar">
    <div class="container nav-inner">
      <a href="../index.html" class="logo">NutriAcesso</a>
      <ul class="nav-links">
        <li><a href="directory.html" class="active">Encontrar Nutricionista</a></li>
        <li><a href="about.html">Sobre</a></li>
        <li><a href="register.html" class="btn btn-primary">Sou Nutricionista</a></li>
      </ul>
      <button class="menu-toggle" id="menuToggle">&#9776;</button>
    </div>
  </nav>

  <main class="directory-page">
    <div class="container">
      <h1 class="page-title">Encontre um Nutricionista</h1>

      <!-- FILTROS -->
      <div class="filters">
        <select id="filterState">
          <option value="">Todos os estados</option>
          <option value="AC">Acre</option>
          <option value="AL">Alagoas</option>
          <option value="AM">Amazonas</option>
          <option value="BA">Bahia</option>
          <option value="CE">Ceará</option>
          <option value="DF">Distrito Federal</option>
          <option value="ES">Espírito Santo</option>
          <option value="GO">Goiás</option>
          <option value="MA">Maranhão</option>
          <option value="MG">Minas Gerais</option>
          <option value="MS">Mato Grosso do Sul</option>
          <option value="MT">Mato Grosso</option>
          <option value="PA">Pará</option>
          <option value="PB">Paraíba</option>
          <option value="PE">Pernambuco</option>
          <option value="PI">Piauí</option>
          <option value="PR">Paraná</option>
          <option value="RJ">Rio de Janeiro</option>
          <option value="RN">Rio Grande do Norte</option>
          <option value="RO">Rondônia</option>
          <option value="RR">Roraima</option>
          <option value="RS">Rio Grande do Sul</option>
          <option value="SC">Santa Catarina</option>
          <option value="SE">Sergipe</option>
          <option value="SP">São Paulo</option>
          <option value="TO">Tocantins</option>
        </select>

        <select id="filterModality">
          <option value="">Todas as modalidades</option>
          <option value="online">Online</option>
          <option value="presencial">Presencial</option>
          <option value="ambos">Ambos</option>
        </select>

        <select id="filterSpecialty">
          <option value="">Todas as especialidades</option>
          <option value="Nutrição Clínica">Nutrição Clínica</option>
          <option value="Nutrição Esportiva">Nutrição Esportiva</option>
          <option value="Nutrição Infantil">Nutrição Infantil</option>
          <option value="Emagrecimento">Emagrecimento</option>
          <option value="Gestantes">Gestantes</option>
          <option value="Veganos e Vegetarianos">Veganos/Vegetarianos</option>
          <option value="Diabetes">Diabetes</option>
          <option value="Hipertrofia">Hipertrofia</option>
        </select>

        <button class="btn btn-primary" id="btnFilter">Filtrar</button>
        <button class="btn btn-outline" id="btnClear">Limpar</button>
      </div>

      <!-- RESULTADOS -->
      <div id="loadingMsg" class="loading">Carregando profissionais...</div>
      <div id="emptyMsg" class="empty" style="display:none">Nenhum nutricionista encontrado com esses filtros.</div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 NutriAcesso. Todos os direitos reservados.</p>
    </div>
  </footer>

  <script src="../js/api.js"></script>
  <script src="../js/directory.js"></script>
</body>
</html>
